<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PodMaster by Saltwaves.studio — AI Podcast Mastering</title>
<meta name="description" content="Master your podcast in 60 seconds. PodMaster cleans noise, balances EQ and matches loudness with AI — built by a sound engineer with 20 years behind the console. Free, no account needed.">
<meta name="keywords" content="podcast mastering, AI audio mastering, podcast loudness, noise reduction, audio mastering online">
<meta property="og:title" content="PodMaster — AI Podcast Mastering by Saltwaves.studio">
<meta property="og:description" content="Drop in your episode, get broadcast-ready audio back. Free to try, no account needed.">
<meta property="og:type" content="website">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
<link href="sections-v2.css" rel="stylesheet">
<style>
  :root {
    --orange: #ff6200;
    --paper: #f1ede8;
    --ink: #1a1a1a;
    --ink-soft: rgba(26, 26, 26, 0.62);
    --paper-soft: rgba(241, 237, 232, 0.62);
    --line: rgba(26, 26, 26, 0.14);
    --line-dark: rgba(241, 237, 232, 0.16);
    --card: #faf8f4;
    --card-dark: #242220;
    --mono: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body {
    font-family: "Space Grotesk", sans-serif;
    font-weight: 400;
    background: var(--paper);
    color: var(--ink);
    font-size: 17px;
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
  }
  h1, h2, h3 { font-weight: 700; line-height: 1.04; letter-spacing: -0.028em; text-wrap: balance; }
  p { text-wrap: pretty; }
  img { display: block; }
  button { font-family: inherit; cursor: pointer; }
  a { color: inherit; }

  .container { max-width: 1140px; margin: 0 auto; padding: 0 24px; }
  section.band { padding: clamp(80px, 11vw, 136px) 0; }
  .band-dark { background: var(--ink); color: var(--paper); }

  .kicker {
    font-family: var(--mono);
    font-size: 12px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--orange);
    display: flex; align-items: center; gap: 10px;
    margin-bottom: 22px;
  }
  .kicker::before { content: ""; width: 26px; height: 2px; background: var(--orange); }
  h2.section-title { font-size: clamp(2rem, 4.2vw, 3rem); margin-bottom: 14px; }
  .section-sub { color: var(--ink-soft); max-width: 54ch; font-size: 18px; }
  .band-dark .section-sub { color: var(--paper-soft); }

  /* Buttons */
  .btn {
    display: inline-flex; align-items: center; gap: 10px;
    font-weight: 700; font-size: 16px; letter-spacing: 0.005em;
    padding: 16px 28px; border-radius: 10px; border: none;
    text-decoration: none;
    transition: transform 0.18s ease, box-shadow 0.18s ease, background 0.18s ease;
  }
  .btn-primary { background: var(--orange); color: var(--ink); }
  .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 10px 28px rgba(255, 98, 0, 0.35); }
  .btn-primary:active { transform: translateY(0); box-shadow: 0 4px 12px rgba(255, 98, 0, 0.3); }
  .btn-ghost { background: transparent; color: inherit; border: 1.5px solid var(--line); }
  .band-dark .btn-ghost, .hero-console .btn-ghost { border-color: var(--line-dark); }
  .btn-ghost:hover { border-color: var(--orange); color: var(--orange); transform: translateY(-2px); }
  .btn-sm { padding: 10px 18px; font-size: 14px; border-radius: 8px; }

  .microcopy { font-family: var(--mono); font-size: 12.5px; letter-spacing: 0.04em; color: var(--ink-soft); }
  .band-dark .microcopy, .hero-console .microcopy { color: var(--paper-soft); }

  /* Reveal on scroll */
  @media (prefers-reduced-motion: no-preference) {
    .reveal { opacity: 0; transform: translateY(18px); transition: opacity 0.65s ease, transform 0.65s ease; }
    .reveal.in { opacity: 1; transform: none; }
    .reveal-d1 { transition-delay: 0.08s; }
    .reveal-d2 { transition-delay: 0.16s; }
    .reveal-d3 { transition-delay: 0.24s; }
  }

  /* Nav */
  .nav {
    position: sticky; top: 0; z-index: 50;
    background: color-mix(in srgb, var(--paper) 86%, transparent);
    backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--line);
  }
  .nav.nav-dark {
    background: color-mix(in srgb, var(--ink) 86%, transparent);
    color: var(--paper);
    border-bottom-color: var(--line-dark);
  }
  .nav-inner { display: flex; align-items: center; justify-content: space-between; height: 72px; }
  .nav-brand { display: flex; align-items: center; gap: 12px; text-decoration: none; font-weight: 700; font-size: 18px; letter-spacing: -0.01em; }
  .nav-brand img { height: 34px; width: auto; }
  .nav-links { display: flex; align-items: center; gap: 32px; list-style: none; }
  .nav-links a { text-decoration: none; font-weight: 500; font-size: 15px; opacity: 0.78; transition: opacity 0.15s ease, color 0.15s ease; }
  .nav-links a:hover { opacity: 1; color: var(--orange); }
  @media (max-width: 760px) { .nav-links { display: none; } }

  /* Upload zone */
  .upload-zone {
    border: 2px dashed rgba(26, 26, 26, 0.28);
    border-radius: 16px;
    background: var(--card);
    padding: 34px 28px;
    text-align: center;
    transition: border-color 0.18s ease, background 0.18s ease, transform 0.18s ease;
    cursor: pointer;
  }
  .upload-zone:hover { border-color: var(--orange); }
  .upload-zone.dragging { border-color: var(--orange); background: #fff7f0; transform: scale(1.012); }
  .upload-zone.dark { background: var(--card-dark); border-color: rgba(241, 237, 232, 0.3); }
  .upload-zone.dark.dragging { background: #2d2a27; }
  .upload-icon {
    width: 52px; height: 52px; border-radius: 50%;
    background: var(--orange); color: var(--ink);
    display: inline-flex; align-items: center; justify-content: center;
    margin-bottom: 14px;
  }
  .upload-title { font-weight: 700; font-size: 18px; margin-bottom: 4px; }
  .upload-file-row {
    display: flex; align-items: center; gap: 14px; text-align: left;
    background: rgba(255, 98, 0, 0.08); border: 1px solid rgba(255, 98, 0, 0.35);
    border-radius: 12px; padding: 14px 16px; margin-bottom: 16px;
  }
  .upload-zone.dark .upload-file-row { background: rgba(255, 98, 0, 0.12); }
  .upload-file-name { font-weight: 700; font-size: 15px; overflow-wrap: anywhere; }

  /* Wave bars */
  .wavebars { display: flex; align-items: center; gap: 3px; height: 56px; }
  .wavebars span {
    flex: 1; min-width: 2px; border-radius: 2px;
    background: currentColor;
    transform-origin: center;
  }
  @media (prefers-reduced-motion: no-preference) {
    .wavebars.playing span { animation: wavepulse 0.9s ease-in-out infinite alternate; }
  }
  @keyframes wavepulse {
    from { transform: scaleY(0.35); }
    to { transform: scaleY(1); }
  }

  /* Demo cards */
  .demo-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; margin-top: 52px; }
  @media (max-width: 800px) { .demo-grid { grid-template-columns: 1fr; } }
  .demo-card {
    background: var(--card-dark); border: 1px solid var(--line-dark);
    border-radius: 18px; padding: 30px;
    transition: border-color 0.2s ease, transform 0.2s ease;
  }
  .demo-card:hover { transform: translateY(-3px); }
  .demo-card.is-mastered:hover { border-color: rgba(255, 98, 0, 0.5); }
  .play-btn {
    width: 58px; height: 58px; border-radius: 50%; border: none; flex: none;
    display: inline-flex; align-items: center; justify-content: center;
    transition: transform 0.15s ease, box-shadow 0.15s ease;
  }
  .play-btn:hover { transform: scale(1.07); }
  .play-raw { background: transparent; border: 2px solid rgba(241, 237, 232, 0.4); color: var(--paper); }
  .play-raw:hover { border-color: var(--paper); }
  .play-mastered { background: var(--orange); color: var(--ink); }
  .play-mastered:hover { box-shadow: 0 8px 24px rgba(255, 98, 0, 0.45); }
  .demo-tags { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 18px; }
  .demo-tag {
    font-family: var(--mono); font-size: 11.5px; letter-spacing: 0.05em;
    padding: 5px 11px; border-radius: 999px; border: 1px solid var(--line-dark);
    color: var(--paper-soft);
  }
  .is-mastered .demo-tag { border-color: rgba(255, 98, 0, 0.45); color: var(--orange); }

  /* Steps */
  .steps-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px; margin-top: 56px; }
  @media (max-width: 800px) { .steps-grid { grid-template-columns: 1fr; } }
  .step-card { border-top: 2px solid var(--ink); padding-top: 26px; position: relative; }
  .step-card::before {
    content: ""; position: absolute; top: -2px; left: 0;
    width: 48px; height: 2px; background: var(--orange);
  }
  .step-num { font-family: var(--mono); font-size: 13px; letter-spacing: 0.1em; color: var(--orange); margin-bottom: 18px; }
  .step-icon { color: var(--ink); margin-bottom: 16px; height: 44px; display: flex; align-items: center; }
  .step-card h3 { font-size: 22px; margin-bottom: 8px; }
  .step-card p { color: var(--ink-soft); font-size: 15.5px; }

  /* Credibility */
  .cred-quote { font-size: clamp(1.7rem, 3.6vw, 2.7rem); font-weight: 700; line-height: 1.18; letter-spacing: -0.02em; max-width: 21ch; }
  .cred-quote em { font-style: normal; color: var(--orange); }
  .cred-meta { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 30px; }
  .cred-chip {
    font-family: var(--mono); font-size: 12px; letter-spacing: 0.08em; text-transform: uppercase;
    border: 1px solid var(--line-dark); border-radius: 999px; padding: 7px 15px; color: var(--paper-soft);
  }

  /* VU meter */
  .vu { display: flex; gap: 5px; align-items: flex-end; }
  .vu i {
    width: 7px; height: 26px; border-radius: 2px;
    background: rgba(241, 237, 232, 0.14);
  }
  .vu i.lit { background: var(--orange); }
  .vu i.hot { background: #f1ede8; }
  @media (prefers-reduced-motion: no-preference) {
    .vu.live i.lit { animation: vuflick 1.6s ease-in-out infinite alternate; }
    .vu.live i.lit:nth-child(odd) { animation-duration: 1.1s; animation-delay: 0.2s; }
  }
  @keyframes vuflick { from { opacity: 1; } to { opacity: 0.45; } }

  /* Pricing */
  .pricing-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px; margin-top: 56px; align-items: stretch; }
  @media (max-width: 900px) { .pricing-grid { grid-template-columns: 1fr; max-width: 440px; margin-left: auto; margin-right: auto; } }
  .price-card {
    background: var(--card); border: 1.5px solid var(--line); border-radius: 18px;
    padding: 34px 30px; display: flex; flex-direction: column;
    transition: transform 0.2s ease, box-shadow 0.2s ease;
  }
  .price-card:hover { transform: translateY(-4px); box-shadow: 0 16px 40px rgba(26, 26, 26, 0.08); }
  .price-card.featured { border-color: var(--orange); border-width: 2px; box-shadow: 0 12px 36px rgba(255, 98, 0, 0.14); }
  .price-badge {
    align-self: flex-start; font-family: var(--mono); font-size: 11.5px; letter-spacing: 0.07em;
    background: var(--orange); color: var(--ink); font-weight: 500;
    border-radius: 999px; padding: 5px 12px; margin-bottom: 18px;
  }
  .price-name { font-size: 20px; font-weight: 700; }
  .price-amount { font-size: 46px; font-weight: 700; letter-spacing: -0.03em; margin: 10px 0 2px; }
  .price-amount small { font-size: 16px; font-weight: 500; color: var(--ink-soft); letter-spacing: 0; }
  .price-list { list-style: none; margin: 22px 0 30px; display: grid; gap: 11px; flex: 1; }
  .price-list li { display: flex; gap: 10px; font-size: 15.5px; color: var(--ink-soft); align-items: baseline; }
  .price-list li::before { content: "—"; color: var(--orange); font-weight: 700; flex: none; }

  /* Footer */
  .footer { background: var(--ink); color: var(--paper); padding: 72px 0 40px; }
  .footer-inner { display: flex; justify-content: space-between; gap: 40px; flex-wrap: wrap; align-items: flex-start; }
  .footer img { width: 170px; height: auto; }
  .footer-links { display: flex; gap: 28px; list-style: none; flex-wrap: wrap; }
  .footer-links a { text-decoration: none; font-size: 15px; font-weight: 500; opacity: 0.7; transition: opacity 0.15s, color 0.15s; }
  .footer-links a:hover { opacity: 1; color: var(--orange); }
  .footer-base {
    margin-top: 48px; padding-top: 24px; border-top: 1px solid var(--line-dark);
    display: flex; justify-content: space-between; gap: 16px; flex-wrap: wrap;
  }
</style>
</head>
<body>
<div id="root"></div>

</html>
